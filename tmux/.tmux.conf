bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ',alacritty*:RGB:clipboard'
set -s set-clipboard on
set -gq allow-passthrough all
set -s extended-keys on

# vi-style keybinds
set -g status-keys vi
set -g mode-keys vi
# bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Use current path in new panes/windows
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# subset of options from tmux-plugins/tmux-sensible
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on

# Claude Code: pane titles are set by the ~/.claude/tmux-notify.sh hook script;
# bells from it put a flag on the window in the status line. The pane title
# bar only appears in windows that are actually split.
set -g pane-border-status off
set-hook -g window-layout-changed 'set -wF pane-border-status "#{?#{==:#{window_panes},1},off,top}"'
set -g pane-border-format " #{pane_index} #{pane_title} "
set -g monitor-bell on
set -g bell-action any
set -g window-status-bell-style "fg=red,bold"
