
[general]
import = ["rose-pine-moon.toml"]

[colors.primary]
background = "#000000"

[font]
size = 10.0

[font.normal]
family = "Berkeley Mono"

[scrolling]
history = 50_000

[mouse]
hide_when_typing = true

[bell]
# 750 Hz / 125 ms matches the Linux console (tty) bell. The beep level is
# fixed (see the Beep amp note in x11/.xprofile), but mute silences it.
command = { program = "beep", args = ["-f", "750", "-l", "125"] }

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
