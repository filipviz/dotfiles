#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
web_search = "live"

approvals_reviewer = "auto_review"

sandbox_mode = "workspace-write"
file_opener = "none"
project_doc_fallback_filenames = ["CLAUDE.md"]
suppress_unstable_features_warning = true
plan_mode_reasoning_effort = "xhigh"
notify = ["/home/f/.codex/notify-tmux.sh", "agent-turn-complete"]
service_tier = "fast"
check_for_update_on_startup = false

[analytics]
enabled = false

[otel]
exporter = "none"
trace_exporter = "none"
metrics_exporter = "none"
log_user_prompt = false

[sandbox_workspace_write]
network_access = true
writable_roots = ["/home/f/.cache", "/home/f/.matplotlib"]

[features]
memories = true
prevent_idle_sleep = true

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 16

[tui]
status_line = ["model-with-reasoning", "current-dir", "context-usage", "context-window-size", "five-hour-limit", "weekly-limit"]
theme = "ansi"
vim_mode_default = true

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

[projects."/home/f"]
trust_level = "trusted"

[projects."/home/f/dev/dotfiles"]
trust_level = "trusted"

[projects."/home/f/dev/utils"]
trust_level = "trusted"

[projects."/home/f/dev/trustworthy-gradients"]
trust_level = "trusted"

[projects."/home/f/dev/grl"]
trust_level = "trusted"

[projects."/home/f/dev/codex"]
trust_level = "trusted"

[projects."/home/f/dev/rl-100"]
trust_level = "trusted"

[notice]
fast_default_opt_out = true
hide_rate_limit_model_nudge = true

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
